<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مقهى جارة القمر</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&family=Amiri:wght@400;700&display=swap');

:root{
--primary:#6b3e2e;
--secondary:#8a5a44;
--accent:#d9b59b;
--bg:#f6efe8;
}

/* الخلفية */
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:"Cairo", sans-serif;
background:linear-gradient(135deg,#f8f1ea,#e8d9cc);
overflow:hidden;
}

/* تأثير خلفي ناعم */
body::before{
content:"";
position:absolute;
width:400px;
height:400px;
background:#d9b59b;
filter:blur(120px);
top:-100px;
left:-100px;
opacity:0.3;
}

body::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:#8a5a44;
filter:blur(120px);
bottom:-100px;
right:-100px;
opacity:0.2;
}

/* الكرت */
.container {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.card {
  width: 300px;
}
}

/* أنيميشن */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* الشعار */
.logo{
width:180px;
margin:0 auto 20px;
}

.logo img{
width:100%;
filter: brightness(0) saturate(100%) invert(18%) sepia(28%) saturate(800%) hue-rotate(350deg);
opacity:0.95;
}

/* النص */
h1{
margin:5px 0;
color:var(--primary);
font-size:26px;
}

.tagline{
font-family:"Amiri", serif;
color:#5c4033;
margin-bottom:25px;
}

/* الأزرار */
.menu-buttons{
display:flex;
flex-direction:column;
gap:14px;
}

/* زر عام */
.btn{
padding:15px;
border-radius:18px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
display:block;
font-size:16px;
}

/* Menu */
.btn-menu{
background:linear-gradient(135deg,#6b3e2e,#8a5a44);
color:#fff;
box-shadow:0 8px 20px rgba(107,62,46,0.4);
}

/* الحلويات */
.btn-dessert{
background:linear-gradient(135deg,#8a5a44,#d9b59b);
color:#fff;
box-shadow:0 8px 20px rgba(138,90,68,0.3);
}

/* واتساب */
.btn-whatsapp{
background:#ffffff;
color:#6b3e2e;
border:2px solid #d9b59b;
}

/* Hover احترافي */
.btn:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:0 12px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container">

  <!-- الشعار -->
  <div class="logo">
    <img src="logo_clean.png" alt="شعار المقهى">
  </div>

  <!-- الاسم -->
  <h1>مقهى جارة القمر</h1>

  

  <!-- الأزرار -->
  <div class="menu-buttons">

    <a href="menu.html" class="btn btn-menu">منيو المشروبات | Drinks Menu</a>

    <a href="dessert.html" class="btn btn-dessert">منيو الحلويات | Desert Menu</a>

    <a href="https://wa.me/966507462033" target="_blank" class="btn btn-whatsapp">
      تواصل واتساب
    </a>

  </div>

</div>

</body>
</html>
