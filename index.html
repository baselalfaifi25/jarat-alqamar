<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مقهى جارة القمر</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&display=swap');

:root{
--primary:#6b3e2e;
--secondary:#8a5a44;
--accent:#d9b59b;
}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:"Cairo", sans-serif;
background:linear-gradient(135deg,#f8f1ea 0%,#efe3d8 50%,#e6d3c4 100%);
padding:15px;
}

.container{
backdrop-filter:blur(12px);
background:rgba(255,255,255,0.45);
border-radius:25px;
padding:25px 15px;
text-align:center;
width:100%;
max-width:380px;
box-shadow:0 15px 30px rgba(0,0,0,0.1);
}

.logo{
width:140px;
margin:0 auto 15px;
}

.logo img{
width:100%;
filter: brightness(0) saturate(100%) invert(18%) sepia(28%) saturate(800%) hue-rotate(350deg);
}

h1{
margin:5px 0;
color:var(--primary);
font-size:24px;
}

.menu-buttons{
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
padding:14px;
border-radius:16px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
display:flex;
align-items:center;
justify-content:center;
font-size:15px;
background:linear-gradient(135deg,#6b3e2e,#8a5a44);
color:#fff;
}

.btn-alt{
background:linear-gradient(135deg,#8a5a44,#d9b59b);
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* السوشال */
.social-grid{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:10px;
margin-top:10px;
}

.social-btn{
display:flex;
align-items:center;
justify-content:center;
border-radius:16px;
padding:18px 0;
background:linear-gradient(135deg,#6b3e2e,#8a5a44);
color:#fff;
font-size:22px;
transition:0.3s;
text-decoration:none;
}

.social-btn.alt{
background:linear-gradient(135deg,#8a5a44,#d9b59b);
}

.social-btn:hover{
transform:translateY(-3px);
box-shadow:0 8px 15px rgba(0,0,0,0.2);
}

@media (max-width:480px){
.logo{width:120px;}
h1{font-size:22px;}
.btn{font-size:14px;padding:13px;}
.container{padding:20px 12px;border-radius:20px;}
.social-btn{font-size:20px;padding:16px 0;}
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="logo_clean.png" alt="شعار المقهى">
  </div>

  <h1>مقهى جارة القمر</h1>

  <div class="menu-buttons">

    <a href="menu.html" class="btn">
      منيو المشروبات | Drinks Menu
    </a>

    <a href="dessert.html" class="btn btn-alt">
      منيو الحلويات | Dessert Menu
    </a>

    <!-- نفس حجم الزر -->
    <div class="btn">
      تجدونا في | Find us on
    </div>

    <div class="social-grid">

      <a href="https://wa.me/966507462033" target="_blank" class="social-btn">
        <i class="fab fa-whatsapp"></i>
      </a>

      <a href="https://snapchat.com/t/sh2qHyb5" target="_blank" class="social-btn alt">
        <i class="fab fa-snapchat"></i>
      </a>

      <a href="https://www.instagram.com/jaratalqamar.sa" target="_blank" class="social-btn">
        <i class="fab fa-instagram"></i>
      </a>

    </div>

  </div>

</div>

</body>
</html>
