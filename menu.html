<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منيو المشروبات</title>

<style>
body{
margin:0;
font-family:"Cairo", sans-serif;
background:#f6efe8;
}

/* الشريط العلوي */
.top-bar{
background:#6b3e2e;
color:#fff;
padding:14px;
text-align:center;
position:fixed;
top:0;
width:100%;
z-index:10;
}

/* زر رجوع */
.back-btn{
position:absolute;
right:15px;
top:14px;
color:#fff;
text-decoration:none;
font-size:14px;
}

/* عرض PDF */
.viewer{
margin-top:60px;
}

iframe{
width:100%;
height:100vh;
border:none;
}
</style>
</head>

<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">رجوع</a>
  منيو المشروبات
</div>

<div class="viewer">
  <!-- 🔥 هذا أهم سطر -->
  <iframe src="https://docs.google.com/gview?url=menu.pdf&embedded=true"></iframe>
</div>

</body>
</html>
