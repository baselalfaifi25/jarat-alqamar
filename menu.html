<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منيو المشروبات</title>

<style>
body{
margin:0;
font-family:"Cairo", sans-serif;
background:#f6efe8;
}

/* الشريط العلوي */
.top-bar{
background:#6b3e2e;
color:#fff;
padding:12px;
text-align:center;
position:fixed;
top:0;
width:100%;
z-index:10;
}

/* زر رجوع */
.back-btn{
position:absolute;
right:15px;
top:12px;
color:#fff;
text-decoration:none;
font-size:14px;
}

/* أزرار التحكم */
.controls{
margin-top:60px;
display:flex;
justify-content:center;
gap:10px;
padding:10px;
}

button{
padding:8px 14px;
border:none;
border-radius:10px;
background:#8a5a44;
color:#fff;
font-size:14px;
cursor:pointer;
}

/* عرض PDF */
.viewer{
display:flex;
justify-content:center;
}

iframe{
width:90%;
height:80vh;
border:none;
transform-origin: top center;
}
</style>
</head>

<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">رجوع</a>
  منيو المشروبات
</div>

<!-- أزرار التكبير -->
<div class="controls">
  <button onclick="zoomIn()">تكبير +</button>
  <button onclick="zoomOut()">تصغير -</button>
  <button onclick="resetZoom()">إعادة</button>
</div>

<!-- عرض PDF -->
<div class="viewer">
  <iframe id="pdfViewer" src="menu.pdf"></iframe>
</div>

<script>
let scale = 1;

function zoomIn(){
  scale += 0.1;
  document.getElementById("pdfViewer").style.transform = `scale(${scale})`;
}

function zoomOut(){
  if(scale > 0.5){
    scale -= 0.1;
    document.getElementById("pdfViewer").style.transform = `scale(${scale})`;
  }
}

function resetZoom(){
  scale = 1;
  document.getElementById("pdfViewer").style.transform = `scale(1)`;
}
</script>

</body>
</html>
